services:
  - type: web
    name: wp-auto-api
    env: image
    region: oregon 
    plan: free
    image:
      url: docker.io/YOUR_DOCKERHUB_USERNAME/wp-publisher-api:latest
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wp-auto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: wp-auto-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: redis
    name: wp-auto-redis
    region: oregon
    plan: free

databases:
  - name: wp-auto-db
    databaseName: wp_publisher_db
    user: admin_wp
    region: oregon
    plan: free
