services:
  database:
    image: postgres:16-alpine
    container_name: wp-auto-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin_password}
      POSTGRES_DB: ${DB_NAME:-wp_publisher_db}
    ports:
      - "5432:5432"
    volumes:
      - wp_postgres_data:/var/lib/postgresql/data
    networks:
      - wp-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wp-auto-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin_password}@database:5432/${DB_NAME:-wp_publisher_db}?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://cache:6379
    depends_on:
      - database
      - cache
    networks:
      - wp-network

  cache:
    image: redis:7-alpine
    container_name: wp-auto-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - wp-network

networks:
  wp-network:
    driver: bridge

volumes:
  wp_postgres_data: